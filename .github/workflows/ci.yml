name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout código
        uses: actions/checkout@v3

      # 2. Setup Node
      - name: Instalar Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3. Backend
      - name: Instalar backend
        run: |
          cd backend
          npm ci

      - name: Test backend (Jest)
        run: |
          cd backend
          npm test

      # 4. Frontend
      - name: Instalar frontend
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # 5. E2E (Playwright)
      - name: Instalar dependencias E2E
        run: |
          cd e2e
          npm ci

      - name: Instalar Playwright browsers
        run: |
          cd e2e
          npx playwright install chromium

      # 🔥 NO levantamos servidores manualmente
      # Playwright lo hace con webServer

      - name: Run E2E tests
        run: |
          cd e2e
          npx playwright test